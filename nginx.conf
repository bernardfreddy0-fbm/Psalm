server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Sécurité — Headers HTTP ───────────────────────────────────────────────

    # Empêche le clickjacking (iframe, frame, object)
    add_header X-Frame-Options "DENY" always;

    # Empêche le MIME sniffing (exécution de fichiers uploadés comme scripts)
    add_header X-Content-Type-Options "nosniff" always;

    # Protection XSS du navigateur (legacy, complément à la CSP)
    add_header X-XSS-Protection "1; mode=block" always;

    # Contrôle des informations transmises dans le referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Désactive les APIs matérielles sensibles
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), serial=(), bluetooth=(), interest-cohort=()" always;

    # Content Security Policy — sources de contenu autorisées
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https: blob:;
        font-src 'self' data:;
        connect-src 'self' https://api.a-e-f.fr;
        media-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
    " always;

    # ── Compression ───────────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml
               application/wasm;

    # ── Cache ─────────────────────────────────────────────────────────────────

    # Assets versionnés (hash dans le nom) — cache 1 an
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html (SPA entry point)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Bloquer les accès aux fichiers sensibles
    location ~ /\.(env|git|htaccess|DS_Store) {
        deny all;
        return 404;
    }

    location ~ \.(sh|sql|bak|config|log)$ {
        deny all;
        return 404;
    }

    # ── SPA routing ───────────────────────────────────────────────────────────

    location / {
        try_files $uri $uri/ /index.html;
    }
}
