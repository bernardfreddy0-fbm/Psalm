name: Claude (commande @claude)

# Permet de piloter le projet depuis le téléphone : commenter "@claude ..."
# sur une issue ou une PR (GitHub Mobile) lance Claude, qui agit puis ouvre/maj une PR.
# Pré-requis : (1) installer l'app GitHub "Claude" sur le repo,
#              (2) ajouter le secret ANTHROPIC_API_KEY.
# L'action détecte elle-même la mention @claude (trigger_phrase par défaut) et
# ne fait rien si elle est absente — pas besoin de garde `if` sur le corps du message.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
