name: Claude (commande @claude)

# Permet de piloter le projet depuis le téléphone : commenter "@claude ..."
# sur une issue ou une PR (GitHub Mobile) lance Claude, qui agit puis ouvre/maj une PR.
# AUTH via abonnement Claude Pro/Max (jeton OAuth), PAS via crédits API :
#   - générer le jeton : `claude setup-token` (Claude Code CLI, compte Pro/Max)
#   - l'ajouter en secret : CLAUDE_CODE_OAUTH_TOKEN
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
